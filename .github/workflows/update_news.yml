name: Update News

on:
  schedule:
    # 8 AM – 6 PM ET (EDT = UTC-4): 12:00–22:00 UTC, Mon–Fri
    - cron: "0 12-22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Fetch news & sentiment
        env:
          AV_API_KEY: ${{ secrets.AV_API_KEY }}
        run: python fetch_news.py

      - name: Commit updated news
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add news_data.json
          git diff --staged --quiet || git commit -m "news: hourly update $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase origin main
          git push
