name: Update FRED Data

on:
  schedule:
    # 21:30 UTC = 5:30 PM ET — after FRED publishes H.15 DGS data (~4:15 PM ET)
    # FRED posts the previous business day's DGS yields at ~4:15 PM the next day
    - cron: "30 21 * * 1-5"
    # 13:00 UTC = 9 AM ET (Tue–Sat) — morning backup in case evening run missed
    - cron: "0 13 * * 2-6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests

      - name: Fetch FRED data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python fred_fetch.py

      - name: Fetch Alpha Vantage data
        env:
          AV_API_KEY: ${{ secrets.AV_API_KEY }}
        run: python fetch_alpha.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add economic_data.json alpha_data.json
          git diff --staged --quiet || git commit -m "data: FRED + Alpha Vantage update $(date -u +%Y-%m-%d)"
          # Pull-rebase in case another run pushed concurrently, then push
          git pull --rebase origin main
          git push
